<svg
  width="520"
  height="120"
  viewBox="0 0 520 120"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="PrimeNexus logo"
>

  <!-- Icon Background -->
  <circle cx="60" cy="60" r="36" fill="#5B6CFF" />

  <!-- Diagonal Divider -->
  <line
    x1="40"
    y1="40"
    x2="80"
    y2="80"
    stroke="#FFFFFF"
    stroke-width="2"
    opacity="0.6"
  />

  <!-- P Letter -->
  <text
    x="48"
    y="52"
    font-family="Arial, sans-serif"
    font-size="18"
    font-weight="700"
    fill="#FFFFFF"
  >
    P
  </text>

  <!-- N Letter -->
  <text
    x="68"
    y="76"
    font-family="Arial, sans-serif"
    font-size="18"
    font-weight="700"
    fill="#FFFFFF"
  >
    N
  </text>

  <!-- Brand Name -->
  <text
    x="120"
    y="55"
    font-family="Arial, sans-serif"
    font-size="40"
    font-weight="700"
    fill="#5B6CFF"
  >
    Prime
  </text>

  <text
    x="230"
    y="55"
    font-family="Arial, sans-serif"
    font-size="40"
    font-weight="700"
    fill="#111827"
  >
    Nexus
  </text>

  <!-- Subtitle -->
  <text
    x="120"
    y="85"
    font-family="Arial, sans-serif"
    font-size="14"
    font-weight="500"
    letter-spacing="2"
    fill="#6B7280"
  >
    NOTTIDGE.DEV PLATFORM
  </text>

</svg>
